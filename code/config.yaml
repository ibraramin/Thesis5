model: TinyLlama/TinyLlama-1.1B-intermediate-step-1431k-3T
max_length: 1024
seed: 42
tfidf_cache_dir: ./cache
# 0 = use the full 9500-example no_robots train split.
# Set to a positive integer (e.g. 2000) for a small-scale pilot run that
# trades statistical power for wall-clock cost. CLI flag --max-train-samples
# overrides this value.
max_train_samples: 0

lora:
  r: 16
  alpha: 32
  target_modules:
    [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  task_type: CAUSAL_LM
  dropout: 0.05

training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  num_train_epochs: 3
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  bf16: true
  gradient_checkpointing: false
  logging_steps: 10
  # Periodic checkpointing for resume. ~1782 steps per experiment at
  # save_steps=200 gives ~9 checkpoints, save_total_limit keeps the 5
  # most recent on disk. Worst-case loss on crash: ~200 steps (~5 min).
  save_steps: 200
  save_strategy: steps
  save_total_limit: 5
  report_to: none
  dataloader_num_workers: 2
  optim: adamw_torch_fused
  max_grad_norm: 1.0

experiments:
  - name: exp1_baseline
    prompt_weight: 0.0
    tfidf_mode: false
    entropy_mode: false
  - name: exp1_low
    prompt_weight: 0.1
    tfidf_mode: false
    entropy_mode: false
  - name: exp1_high
    prompt_weight: 0.5
    tfidf_mode: false
    entropy_mode: false
  - name: exp2_lexical
    prompt_weight: 0.0
    tfidf_mode: true
    entropy_mode: false
  - name: exp3_combined
    prompt_weight: 0.1
    tfidf_mode: true
    entropy_mode: false
  - name: exp4_entropy
    prompt_weight: 0.1
    tfidf_mode: false
    entropy_mode: true
